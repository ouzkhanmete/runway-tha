services:
  postgres-test:
    image: postgres:18
    container_name: runway-pg-test
    environment:
      POSTGRES_USER: runway
      POSTGRES_PASSWORD: runway
      POSTGRES_DB: runway_test
    ports: ["5433:5432"]
    tmpfs: ["/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runway"]
      interval: 2s
      retries: 15
