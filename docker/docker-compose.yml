services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: runway
      POSTGRES_PASSWORD: runway
      POSTGRES_DB: runway
    ports: ["5432:5432"]
    volumes: ["runway_pg:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runway"]
      interval: 3s
      retries: 10
volumes:
  runway_pg: {}
