services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: runway
      POSTGRES_PASSWORD: runway
      POSTGRES_DB: runway
    ports: ["5432:5432"]
    # Bind-mounted to a gitignored dir in the repo root so data survives restarts
    # (and even `down -v`) and is visible on disk. Path is relative to this file (docker/).
    volumes: ["../.data/postgres-dev:/var/lib/postgresql"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runway"]
      interval: 3s
      retries: 10
